services:
  - type: web
    name: urban-climate-risk-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_ALG
        value: HS256
      - key: DATABASE_URL
        fromDatabase:
          name: urban-climate-db
          property: connectionString

databases:
  - name: urban-climate-db
    databaseName: climate_api
    user: climate_user
    plan: free